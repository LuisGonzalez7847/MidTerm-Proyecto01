<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas (estilo funcional)</title>
  <style>
    :root {
      --mar: #117a8b;
      --mar-claro: #2a9db5;
      --atardecer: #ff7a59;
      --arena: #fbf3e7;
      --texto: #2b2b2b;
    }
    body {
      font-family: Arial, sans-serif; max-width: 680px; margin: 0 auto 40px auto;
      background: var(--arena); color: var(--texto);
    }
    header {
      background: linear-gradient(120deg, var(--atardecer), #ffb347 45%, var(--mar-claro));
      color: #fff; padding: 26px 22px; border-radius: 0 0 14px 14px; margin-bottom: 22px;
    }
    header h1 { font-size: 23px; margin: 0 0 6px 0; }
    header p { margin: 0; font-size: 14px; opacity: 0.95; }
    main { padding: 0 22px; }
    textarea {
      width: 100%; height: 70px; padding: 10px; font-size: 15px; box-sizing: border-box;
      border: 1px solid #d8cdba; border-radius: 8px;
    }
    button {
      margin-top: 14px; padding: 11px 22px; font-size: 15px; cursor: pointer; color: #fff;
      background: var(--atardecer); border: none; border-radius: 8px; font-weight: bold;
    }
    button:hover { background: #ef6645; }
    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 22px;
    }
    .stat {
      background: #fff; border-radius: 10px; padding: 14px 10px; text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-top: 4px solid var(--mar-claro);
    }
    .valor { font-size: 22px; font-weight: bold; color: var(--mar); }
    .etiqueta { font-size: 12px; color: #6b6256; margin-top: 4px; }
    .filtros {
      background: #fff; border-left: 6px solid var(--atardecer); border-radius: 8px;
      padding: 4px 16px; margin-top: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .filtros strong { color: var(--mar); }
    .vacio { margin-top: 22px; color: #7a6f5f; }
  </style>
</head>
<body>
  <header>
    <h1>Estadísticas de una lista de números 📊</h1>
    <p>Escribe varios números separados por comas o espacios. El cálculo se hace con funciones puras y <code>map</code>, <code>filter</code> y <code>reduce</code> (estilo funcional).</p>
  </header>

  <main>
    <textarea id="entrada" placeholder="Ej: 10, 5, 8, 3, 20, 7, 8"></textarea>
    <br>
    <button onclick="calcular()">Calcular</button>

    <div id="resultados"></div>
  </main>

  <script src="estadisticas.js"></script>
</body>
</html>
