<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recomendador Turístico del Oeste (Prolog)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 640px; margin: 30px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 22px; }
    p.intro { color: #555; }
    .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 18px 0; }
    label { display: block; font-size: 14px; margin-bottom: 4px; }
    select { width: 100%; padding: 6px; }
    button { padding: 10px 18px; font-size: 15px; cursor: pointer; }
    #resultados { margin-top: 18px; }
    #resultados ul { padding-left: 20px; }
    .query-box { margin-top: 18px; font-size: 13px; color: #555; }
    .query-box code { background: #f2f2f2; padding: 4px 6px; display: inline-block; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Recomendador Turístico del Oeste</h1>
  <p class="intro">Escoge tus preferencias. Las reglas en Prolog (Tau Prolog) deciden qué lugares del oeste de Puerto Rico cumplen con lo que pides.</p>

  <div class="menu">
    <div>
      <label for="tipo">Tipo</label>
      <select id="tipo">
        <option value="playa">Playa</option>
        <option value="atardecer">Punto de atardecer</option>
        <option value="comida">Comida</option>
      </select>
    </div>
    <div>
      <label for="presupuesto">Presupuesto</label>
      <select id="presupuesto">
        <option value="gratis">Gratis</option>
        <option value="pago">De pago</option>
      </select>
    </div>
    <div>
      <label for="momento">Momento</label>
      <select id="momento">
        <option value="dia">De día</option>
        <option value="atardecer">Al atardecer</option>
      </select>
    </div>
    <div>
      <label for="pueblo">Pueblo</label>
      <select id="pueblo">
        <option value="cualquiera">Cualquiera</option>
        <option value="aguadilla">Aguadilla</option>
        <option value="rincon">Rincón</option>
        <option value="cabo_rojo">Cabo Rojo</option>
        <option value="mayaguez">Mayagüez</option>
      </select>
    </div>
  </div>

  <button onclick="recomendar()">Recomendar</button>

  <div id="resultados"></div>

  <div class="query-box">
    Consulta enviada a Prolog:
    <code id="consulta">(todavía no has pedido nada)</code>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tau-prolog@0.3.4/modules/core.js"></script>
  <script src="recomendador.js"></script>
</body>
</html>
