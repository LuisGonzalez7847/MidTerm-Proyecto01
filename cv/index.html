<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum Vitae - Luis González</title>

  <!-- jsPDF: librería para generar el PDF en el navegador (CDN, requiere internet) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; color: #222; background: #f4f4f4; }
    .barra { background: #1f3a5f; color: white; padding: 12px 20px; }
    .barra a { color: #cfe0f5; text-decoration: none; }
    .contenido { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
    .panel { background: white; padding: 20px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    /* Panel izquierdo: editor */
    #lado-editor { flex: 1; min-width: 280px; }
    .cat-edit h3 { margin: 14px 0 6px; font-size: 15px; color: #1f3a5f; }
    .fila { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 14px; }
    .fila span { flex: 1; }
    .fila button { font-size: 12px; cursor: pointer; }

    .formulario { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 14px; }
    .formulario input, .formulario select, .formulario textarea {
      width: 100%; box-sizing: border-box; margin: 4px 0; padding: 6px; font-size: 14px;
    }
    .botones button {
      padding: 8px 14px; margin: 4px 4px 0 0; border: none; border-radius: 4px;
      background: #1f3a5f; color: white; cursor: pointer; font-size: 14px;
    }
    .botones .gris { background: #777; }

    /* Panel derecho: resume */
    #lado-resume { flex: 1.3; min-width: 320px; }
    #resume h1 { margin: 0 0 4px; }
    #resume section { margin-top: 16px; }
    #resume h2 { font-size: 16px; border-bottom: 2px solid #1f3a5f; padding-bottom: 3px; color: #1f3a5f; }
    .entrada { margin: 8px 0; }
    .entrada .titulo { font-weight: bold; }
    .entrada .fecha { float: right; color: #666; font-size: 13px; }
    .entrada .subtitulo { font-style: italic; color: #444; }
    .entrada .detalle { font-size: 14px; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="barra"><a href="../index.html">&larr; Menú</a> &nbsp;|&nbsp; Curriculum Vitae</div>

  <div class="contenido">
    <div class="panel" id="lado-editor">
      <h2>Editar CV</h2>
      <p style="font-size:14px;color:#555">Marca o desmarca qué entradas van en el resume.</p>
      <div id="editor"></div>

      <div class="formulario">
        <h3>Agregar entrada</h3>
        <select id="f-categoria"></select>
        <input id="f-titulo" placeholder="Título">
        <input id="f-subtitulo" placeholder="Subtítulo (opcional)">
        <input id="f-fecha" placeholder="Fecha (opcional)">
        <textarea id="f-detalle" placeholder="Detalle (opcional)" rows="2"></textarea>
        <div class="botones">
          <button onclick="agregar()">Agregar</button>
        </div>
      </div>

      <div class="botones" style="margin-top:16px">
        <button onclick="descargarPDF()">Descargar PDF</button>
        <button class="gris" onclick="restaurar()">Restaurar original</button>
      </div>
    </div>

    <div class="panel" id="lado-resume">
      <div id="resume"></div>
    </div>
  </div>

  <script src="cv.js"></script>
</body>
</html>
